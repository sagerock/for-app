<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141310">
<title>For — a practice of remembering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #211f1a;
    font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; gap: 22px; padding: 24px 16px 20px; }

  .phone { position: relative; width: min(100%, 402px); height: min(calc(100dvh - 120px), 874px);
    border-radius: 40px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.05); background: var(--bg); }
  @media (max-width: 460px) {
    body { padding: 0; gap: 0; }
    .phone { width: 100%; height: 100dvh; border-radius: 0; box-shadow: none; }
    .dock { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20,19,16,0.92); backdrop-filter: blur(8px); padding: 9px 8px 12px; }
  }

  .phone[data-theme="dark"] { --bg:#141310; --card:rgba(230,224,208,0.06);
    --fg-strong:#efe9dc; --fg:#d7d1c2; --muted:rgba(215,209,194,0.44); --faint:rgba(215,209,194,0.20);
    --accent:#aab598; --accent-glow:radial-gradient(circle, rgba(170,181,152,0.16), rgba(170,181,152,0) 70%);
    --accent-line:rgba(170,181,152,0.45); --hair:rgba(215,209,194,0.12); }
  .phone[data-theme="paper"] { --bg:#faf8f3; --card:rgba(255,255,255,0.72);
    --fg-strong:#2b2a26; --fg:#4b4843; --muted:rgba(75,72,67,0.62); --faint:rgba(75,72,67,0.32);
    --accent:#58654d; --accent-glow:radial-gradient(circle, rgba(88,101,77,0.12), rgba(88,101,77,0) 70%);
    --accent-line:rgba(88,101,77,0.4); --hair:rgba(75,72,67,0.14); }

  .screen { position: absolute; inset: 0; background: var(--bg); color: var(--fg); display: flex; flex-direction: column; font-family: 'Hanken Grotesk', sans-serif; }
  .serif { font-family: 'Source Serif 4', Georgia, serif; }

  @keyframes forBreathe { 0%,100%{ transform:scale(0.62); opacity:0.45; } 50%{ transform:scale(1.04); opacity:0.92; } }
  @keyframes forFade { from{ opacity:0; } to{ opacity:1; } }
  @keyframes forRise { from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }
  @keyframes forHint { 0%,55%{ opacity:0; } 100%{ opacity:0.4; } }
  @keyframes forPulse { 0%,100%{ opacity:0.25; } 50%{ opacity:0.7; } }
  @keyframes forStep { from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:none; } }

  .tap { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .act { font-size:13px; letter-spacing:0.16em; text-transform:uppercase; }
  .replies-link { font-size:13px; letter-spacing:0.06em; color:var(--accent); border-bottom:1px solid var(--accent-line); padding-bottom:2px; }

  .dock { display: flex; flex-direction: column; align-items: center; gap: 12px; width: min(100%, 460px); }
  .dock .pills { display:flex; flex-wrap:wrap; justify-content:center; gap:5px 7px; }
  .dock .pill { cursor:pointer; font-size:12px; letter-spacing:0.03em; padding:6px 12px; border-radius:999px; color:rgba(233,228,214,0.42); transition:all 180ms; user-select:none; }
  .dock .pill[data-active="true"] { color:#e9e4d6; background:rgba(170,181,152,0.18); }
  .dock .seg { display:flex; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:999px; padding:3px; }
  .dock .seg div { cursor:pointer; font-size:12px; letter-spacing:0.05em; padding:7px 16px; border-radius:999px; transition:all 180ms; color:rgba(233,228,214,0.5); user-select:none; }
  .dock .seg div[data-on="true"] { color:#141310; background:#aab598; font-weight:600; }
  .dock .note { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(233,228,214,0.28); }
  textarea:focus { outline: none; }
  textarea::placeholder { color: var(--faint); }
  .tap:focus-visible, [data-theme-set]:focus-visible { outline: 2px solid var(--accent, #aab598); outline-offset: 3px; border-radius: 8px; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 1ms !important; animation-delay: 0ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>

  <div class="phone" id="phone" data-theme="dark">
    <div class="screen" id="screen"></div>
  </div>

  <div class="dock">
    <div class="pills" id="pills"></div>
    <div class="seg" id="themeSeg">
      <div data-theme-set="dark" data-on="true" tabindex="0" role="button">Dark</div>
      <div data-theme-set="paper" data-on="false" tabindex="0" role="button">Paper</div>
    </div>
    <div class="note">home wakes you · the study room is where the work is kept</div>
  </div>

<script>
(function () {
  const ME = "Jamie J.";

  const GROUP = [
    { q: "What woke you today — if anything did?", replies: [
        { t: "Nothing, until the kettle. Then I was here for one second.", by: "Ana R." },
        { t: "Is being woken the same as waking?", by: "Marcus T.", isQ: true } ] },
    { q: "Where do you go when you disappear?", replies: [] },
    { q: "What are you pretending not to know?", replies: [
        { t: "That I heard it the first time.", by: "Dae K." },
        { t: "That the pretending is the comfortable part.", by: "Ruth M." },
        { t: "What would change if I admitted it?", by: "Ana R.", isQ: true } ] },
    { q: "Who is asking?", replies: [
        { t: "I keep answering before I find out.", by: "Sage L." } ] },
    { q: "When did you last feel your own weight?", replies: [] },
    { q: "What runs you when no one is watching?", replies: [
        { t: "The next thing. Always the next thing.", by: "Marcus T." } ] },
    { q: "What would you notice if you moved half as fast?", replies: [] },
    { q: "What are you still carrying that was never yours?", replies: [
        { t: "A voice that isn't mine, telling me to hurry.", by: "Ruth M." },
        { t: "Whose is it, then?", by: "Dae K.", isQ: true } ] },
  ];

  // The pause is one guided sequence, the same every time — body, then soul, then mind (mind last).
  // On the mind step the picture goes still: nothing left to watch, just a space prepared.
  const PAUSE_STEPS = [
    { head: "Wake your body", sub: "consciously shift your position", ms: 8500,  still: false },
    { head: "Wake your soul", sub: "breathe",                         ms: 11000, still: false },
    { head: "Wake your mind", sub: "prepare a space in your mind",    ms: 13000, still: true  },
  ];

  const NAV = [
    { key: "splash",    label: "Splash" },
    { key: "lock",      label: "The call" },
    { key: "pause",     label: "The pause" },
    { key: "questions", label: "Questions" },
    { key: "study",     label: "Study Room" },
    { key: "about",     label: "About" },
  ];

  const state = {
    screen: "splash",
    theme: "dark",
    sound: true,
    pauseStep: 0,
    callIdxs: [],
    currentIdx: null,
    byoqStage: "open",
  };

  const phone   = document.getElementById("phone");
  const screen  = document.getElementById("screen");
  const pillsEl = document.getElementById("pills");
  let timer = null;

  const clearTimer = () => { if (timer) { clearTimeout(timer); timer = null; } };
  const curQ = () => (state.currentIdx == null ? null : GROUP[state.currentIdx]);
  const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  // ---- Small "faces": initial avatars -------------------------------------
  const AV_COLORS = ["rgba(170,181,152,0.34)","rgba(192,138,94,0.30)","rgba(138,153,129,0.36)","rgba(150,142,120,0.34)","rgba(120,150,150,0.32)"];
  const initials = (n) => n.split(/\s+/).map(w => w[0] || "").join("").slice(0, 2).toUpperCase();
  const avColor = (n) => { let h = 0; for (const c of n) h = (h * 31 + c.charCodeAt(0)) >>> 0; return AV_COLORS[h % AV_COLORS.length]; };
  const authorRow = (name, note) => `
    <div style="display:flex; align-items:center; gap:9px; margin-top:9px;">
      <div style="width:24px; height:24px; border-radius:50%; background:${avColor(name)}; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--fg-strong); font-weight:600;">${esc(initials(name))}</div>
      <div style="font-size:12.5px; color:var(--muted);">${esc(name)}${note ? ` · <span style="color:var(--faint);">${note}</span>` : ""}</div>
    </div>`;

  // ---- Sound: soft two-note chimes via Web Audio -------------------------
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; } }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }
  function chime(kind) {
    if (!state.sound || !audioCtx) return;
    const now = audioCtx.currentTime;
    const notes = kind === "open" ? [587.33, 880.0] : [880.0, 587.33];
    notes.forEach((f, i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = "sine"; o.frequency.value = f;
      const t = now + i * 0.30;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.13, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 1.6);
      o.connect(g).connect(audioCtx.destination);
      o.start(t); o.stop(t + 1.7);
    });
  }

  // ---- Questions ----------------------------------------------------------
  function pullQuestion() {
    const avail = GROUP.map((_, i) => i).filter(i => !state.callIdxs.includes(i));
    const idx = avail.length ? pick(avail) : 0;
    state.callIdxs.push(idx);
    state.currentIdx = idx;
  }
  function ensureFocus() { if (state.currentIdx == null) state.currentIdx = Math.floor(Math.random() * GROUP.length); }

  function schedulePauseStep() {
    const step = PAUSE_STEPS[state.pauseStep];
    timer = setTimeout(() => {
      if (state.pauseStep < PAUSE_STEPS.length - 1) {
        state.pauseStep++;
        render();
        schedulePauseStep();
      } else {
        chime("close");
        go("questions");
      }
    }, step.ms);
  }

  // ---- Screens ------------------------------------------------------------
  const screens = {
    splash: () => `
      <div class="tap" data-go="lock" style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px 40px 56px; animation:forFade 1.6s ease both;">
        <div style="flex:1"></div>
        <div class="serif" style="font-size:82px; font-weight:400; line-height:1; letter-spacing:-0.01em; color:var(--fg-strong);">for<span style="color:var(--accent)">.</span></div>
        <div style="margin-top:22px; font-size:12.5px; letter-spacing:0.28em; text-transform:uppercase; color:var(--muted);">a practice of remembering</div>
        <div style="flex:1"></div>
        <div style="font-size:13px; letter-spacing:0.14em; color:var(--faint); animation:forPulse 4.5s ease-in-out infinite;">touch to enter</div>
      </div>`,

    lock: () => `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; padding:88px 22px 44px; animation:forFade 1.4s ease both;">
        <div class="serif" style="font-weight:300; font-size:76px; line-height:1; color:var(--fg-strong); letter-spacing:-0.02em;">9:41</div>
        <div style="margin-top:10px; font-size:15px; color:var(--muted);">Saturday, July 11</div>
        <div style="flex:1"></div>
        <div class="tap" data-go="pause" style="width:100%; background:var(--card); border:1px solid var(--hair); border-radius:22px; padding:16px 17px; animation:forRise 1s ease both; animation-delay:0.5s; opacity:0;">
          <div style="display:flex; align-items:center; gap:9px; margin-bottom:9px;">
            <div class="serif" style="width:20px; height:20px; border-radius:6px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--bg);">f</div>
            <div style="font-size:13px; font-weight:600; letter-spacing:0.04em; color:var(--fg); text-transform:uppercase;">For</div>
            <div style="flex:1"></div>
            <div style="font-size:12.5px; color:var(--muted);">now</div>
          </div>
          <div class="serif" style="font-size:21px; line-height:1.3; color:var(--fg-strong);">Wake up. You're here.</div>
        </div>
        <div style="margin-top:22px; font-size:12.5px; letter-spacing:0.06em; color:var(--faint);">it will not always come — you would feel it, then reach for it</div>
      </div>`,

    // The guided pause: body -> breath -> mind, the same every time.
    pause: () => {
      const step = PAUSE_STEPS[state.pauseStep] || PAUSE_STEPS[0];
      const dots = PAUSE_STEPS.map((_, i) =>
        `<div style="width:6px; height:6px; border-radius:50%; background:${i === state.pauseStep ? "var(--accent)" : "var(--hair)"};"></div>`).join("");
      const circle = step.still
        ? `<div style="position:relative; width:190px; height:190px; display:flex; align-items:center; justify-content:center; animation:forFade 2.4s ease both;">
             <div style="position:absolute; width:150px; height:150px; border-radius:50%; border:1px solid var(--accent); opacity:0.45;"></div>
             <div style="width:7px; height:7px; border-radius:50%; background:var(--accent); opacity:0.7;"></div>
           </div>`
        : `<div style="position:relative; width:190px; height:190px; display:flex; align-items:center; justify-content:center;">
             <div style="position:absolute; width:190px; height:190px; border-radius:50%; border:1px solid var(--accent); animation:forBreathe 11s ease-in-out infinite;"></div>
             <div style="position:absolute; width:190px; height:190px; border-radius:50%; background:var(--accent-glow); animation:forBreathe 11s ease-in-out infinite;"></div>
             <div style="width:7px; height:7px; border-radius:50%; background:var(--accent); opacity:0.85;"></div>
           </div>`;
      return `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:52px 40px; animation:forFade 1s ease both; overflow:hidden;">
        <div style="height:40px;"></div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center; width:100%;">${circle}</div>
        <div style="min-height:78px; display:flex; flex-direction:column; align-items:center; gap:9px; text-align:center;">
          <div class="serif" style="font-size:24px; line-height:1.3; color:var(--fg-strong); animation:forStep 1.1s ease both;">${esc(step.head)}</div>
          <div style="font-size:13.5px; letter-spacing:0.04em; color:var(--muted); animation:forStep 1.6s ease both;">${esc(step.sub)}</div>
        </div>
        <div style="display:flex; gap:8px; margin-top:22px;">${dots}</div>
      </div>`;
    },

    questions: () => {
      const q = curQ();
      const n = q.replies.length;
      const label = n > 0 ? `${n} ${n === 1 ? "reply" : "replies"} — enter the study room` : "no replies yet — enter the study room";
      return `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px 40px 44px; animation:forFade 1.6s ease both;">
        <div style="flex:1"></div>
        <div class="serif" style="font-size:30px; font-weight:400; line-height:1.42; text-align:center; text-wrap:balance; color:var(--fg-strong); animation:forRise 1.8s ease both;">${esc(q.q)}</div>
        <div style="margin-top:22px; animation:forHint 3.5s ease both;">
          <span class="tap replies-link" data-go="study">${label}</span>
        </div>
        <div style="flex:1"></div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:18px; animation:forHint 4s ease both;">
          ${state.callIdxs.length < 2 ? `<span class="tap act" data-action="another" style="color:var(--muted);">another</span>` : ``}
          <div class="tap" data-go="rest" style="font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">put it down</div>
        </div>
      </div>`;
    },

    study: () => {
      const q = curQ();
      const n = q.replies.length;
      const body = n === 0
        ? `<div style="font-size:15px; line-height:1.7; color:var(--muted); font-style:italic;">No one has replied. You could be the first — or let it stand, unanswered.</div>`
        : q.replies.map(r => `
            <div style="margin-bottom:26px;">
              ${r.isQ
                ? `<div class="serif" style="font-style:italic; font-size:18px; line-height:1.5; color:var(--fg-strong);">${esc(r.t)}</div>`
                : `<div style="font-size:15.5px; line-height:1.72; color:var(--fg);">${esc(r.t)}</div>`}
              ${authorRow(r.by || "a member", r.isQ ? "a question in reply" : "")}
            </div>`).join("");
      return `
      <div style="height:100%; overflow-y:auto; padding:72px 28px 40px; animation:forFade 1s ease both;">
        <div class="serif" style="font-size:14px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:18px;">The Study Room</div>
        <div class="serif" style="font-size:24px; line-height:1.4; color:var(--fg-strong); margin-bottom:8px;">${esc(q.q)}</div>
        <div style="font-size:12.5px; letter-spacing:0.06em; color:var(--muted); margin-bottom:24px;">${n} ${n === 1 ? "reply" : "replies"} · no counts kept, no order but arrival</div>
        <div style="height:1px; background:var(--hair); margin-bottom:26px;"></div>
        ${body}
        <div style="height:1px; background:var(--hair); margin:14px 0 26px;"></div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:18px;">
          <div style="display:flex; gap:26px;">
            <span class="tap act" data-go="respond" style="color:var(--accent);">Reply</span>
            <span class="tap act" data-go="byoq" style="color:var(--muted);">Ask a question</span>
          </div>
          <div class="tap" data-go="rest" style="font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">leave</div>
        </div>
      </div>`;
    },

    respond: () => {
      const q = curQ();
      return `
      <div style="height:100%; display:flex; flex-direction:column; padding:84px 34px 44px; animation:forFade 1s ease both;">
        <div class="serif" style="font-size:13px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:16px;">Responding to</div>
        <div class="serif" style="font-size:21px; line-height:1.4; color:var(--fg-strong); margin-bottom:8px;">${esc(q.q)}</div>
        <div style="font-size:12px; color:var(--faint); margin-bottom:22px;">as ${esc(ME)}</div>
        <textarea id="respondInput" rows="5" placeholder="Say only what's true. No one is timing you." style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--hair); padding:8px 0; font-family:'Source Serif 4',serif; font-size:19px; line-height:1.5; color:var(--fg-strong); resize:none;"></textarea>
        <div style="flex:1"></div>
        <div class="tap act" data-action="reply" style="align-self:center; color:var(--accent); border:1px solid var(--accent-line); border-radius:999px; padding:13px 32px;">Reply</div>
        <div style="text-align:center; margin-top:14px; font-size:11.5px; letter-spacing:0.1em; color:var(--faint);">when you reply, it will hold you a moment</div>
      </div>`;
    },

    freeze: () => `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px; animation:forFade 1.4s ease both;">
        <div style="width:9px; height:9px; border-radius:50%; background:var(--accent); opacity:0.8; animation:forBreathe 6s ease-in-out infinite;"></div>
        <div style="margin-top:32px; font-size:12px; letter-spacing:0.26em; text-transform:uppercase; color:var(--faint); animation:forHint 5s ease both;">held</div>
      </div>`,

    rest: () => `
      <div style="height:100%; display:flex; align-items:center; justify-content:center; padding:64px; animation:forFade 2.2s ease both;">
        <div class="serif" style="font-style:italic; font-size:19px; color:var(--faint);">put it down</div>
      </div>`,

    about: () => `
      <div style="height:100%; overflow-y:auto; padding:80px 30px 56px; animation:forFade 1.2s ease both;">
        <div class="serif" style="font-size:15px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:20px;">About this group</div>
        <div class="serif" style="font-size:19px; line-height:1.62; color:var(--fg); margin-bottom:16px;">We are a living group formed in 2026 to study and discuss the ideas of Gurdjieff's Fourth Way. We seek to remember ourselves. We claim no authority or lineage.</div>
        <div style="font-size:15px; line-height:1.72; color:var(--muted); margin-bottom:14px;">Current members are encouraged to read, reflect, and contribute. All content here is user-generated. It is kept for continued reflection but may not be permanent. The group is alive: members come and go, and what exists in this space is the responsibility of the current users.</div>
        <div style="height:1px; background:var(--hair); margin:26px 0;"></div>
        <div class="serif" style="font-size:18px; color:var(--fg-strong); margin-bottom:8px;">Why a phone?</div>
        <div style="font-size:15px; line-height:1.72; color:var(--muted); margin-bottom:26px;">It's hard to say what Gurdjieff would make of these devices. They're built to be addictive — and the work is to break free of automatism. Learning to use one with attention may be exactly the training.</div>
        <div class="serif" style="font-size:18px; color:var(--fg-strong); margin-bottom:16px;">Suggestions for being here</div>
        <div style="display:flex; flex-direction:column; gap:20px;">
          ${[
            ["When it calls you, stop.", "The app calls to you briefly. Be present for the moment it gives you — that moment is the point. You may react, but you need not engage."],
            ["Bring questions.", "Post them to ask yourself and the group. You are the text of this group. A question may be lived with and left unresolved; within each one, answers may already exist. Resist the desire to mine them. Let the questions remain unmolested."],
            ["Bring attention.", "You may take part fully just by being present — without commenting, questioning, or posting at all. Until more is needed, there are no rules for how you do or don't engage."],
            ["Keep the goal in view.", "We are here to remember ourselves — to bring mind, body, and soul together as we question our way to waking."],
          ].map(([h, b]) => `
            <div>
              <div class="serif" style="font-style:italic; font-size:16px; color:var(--fg); margin-bottom:5px;">${h}</div>
              <div style="font-size:14.5px; line-height:1.7; color:var(--muted);">${b}</div>
            </div>`).join("")}
        </div>
        <div style="height:20px;"></div>
      </div>`,

    byoq: () => state.byoqStage === "open" ? `
      <div style="height:100%; display:flex; flex-direction:column; padding:96px 34px 56px; animation:forFade 1.2s ease both;">
        <div class="serif" style="font-size:15px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:26px;">A question of your own</div>
        <div class="serif" style="font-size:24px; line-height:1.4; color:var(--fg-strong); margin-bottom:8px;">Leave a question with the group.</div>
        <div style="font-size:14.5px; line-height:1.7; color:var(--muted); margin-bottom:34px;">Not to be answered. To be lived with. No one will like it, count it, or reply — until, one day, someone does.</div>
        <textarea id="byoqInput" rows="3" placeholder="What do you want to sit with?" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--hair); padding:8px 0; font-family:'Source Serif 4',serif; font-size:20px; line-height:1.4; color:var(--fg-strong); resize:none;"></textarea>
        <div style="flex:1"></div>
        <div class="tap act" data-action="submitByoq" style="align-self:center; color:var(--accent); border:1px solid var(--accent-line); border-radius:999px; padding:13px 30px;">Leave it</div>
      </div>` : `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:64px 34px; animation:forFade 1.4s ease both;">
        <div class="serif" style="font-style:italic; font-size:22px; color:var(--fg-strong); margin-bottom:14px;">It's with the group.</div>
        <div style="font-size:14px; line-height:1.7; color:var(--muted); max-width:250px; margin-bottom:30px;">Let it be. It will find you, or someone, another day.</div>
        <div class="tap" data-go="rest" style="font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">put it down</div>
      </div>`,
  };

  // ---- Render & navigation ------------------------------------------------
  function render() {
    phone.setAttribute("data-theme", state.theme);
    screen.innerHTML = screens[state.screen]();
    renderPills();
  }

  function go(name) {
    clearTimer();

    if (name === "splash" || name === "lock" || name === "pause") state.callIdxs = [];
    if (name === "questions" && state.callIdxs.length === 0) pullQuestion();
    if (name === "study" || name === "respond" || name === "byoq") ensureFocus();
    if (name === "byoq") state.byoqStage = "open";

    state.screen = name;

    if (name === "pause") {
      state.pauseStep = 0;
      render();
      ensureAudio(); chime("open");
      schedulePauseStep();
      return;
    }

    render();

    if (name === "freeze") {
      timer = setTimeout(() => { go("rest"); }, 10000);
    } else if (name === "rest") {
      timer = setTimeout(() => { go("splash"); }, 4500);
    }
  }

  function renderPills() {
    pillsEl.innerHTML = NAV.map(n => {
      const active = state.screen === n.key ||
        (n.key === "questions" && state.screen === "rest") ||
        (n.key === "study" && ["respond", "freeze", "byoq"].includes(state.screen));
      return `<div class="pill" data-active="${active}" data-go="${n.key}">${n.label}</div>`;
    }).join("");
  }

  // ---- Events -------------------------------------------------------------
  document.addEventListener("click", (e) => {
    ensureAudio();

    const goEl = e.target.closest("[data-go]");
    if (goEl) { go(goEl.getAttribute("data-go")); return; }

    const act = e.target.closest("[data-action]");
    if (act) {
      const a = act.getAttribute("data-action");
      if (a === "another") { if (state.callIdxs.length < 2) pullQuestion(); render(); return; }
      if (a === "reply") {
        const ta = document.getElementById("respondInput");
        const val = ta && ta.value.trim();
        if (val && curQ()) curQ().replies.push({ t: val, by: ME });
        go("freeze"); return;
      }
      if (a === "submitByoq") {
        const ta = document.getElementById("byoqInput");
        const val = ta && ta.value.trim();
        if (val) GROUP.push({ q: val, replies: [] });
        state.byoqStage = "done"; render(); return;
      }
    }

    const themeEl = e.target.closest("[data-theme-set]");
    if (themeEl) {
      state.theme = themeEl.getAttribute("data-theme-set");
      document.querySelectorAll("#themeSeg [data-theme-set]").forEach(d =>
        d.setAttribute("data-on", d.getAttribute("data-theme-set") === state.theme));
      phone.setAttribute("data-theme", state.theme);
      return;
    }
  });

  document.getElementById("themeSeg").addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); e.target.click(); }
  });

  render();
})();
</script>
</body>
</html>
