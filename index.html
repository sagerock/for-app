<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141310">
<title>Forth — self-remembering</title>
<script>if (location.hostname === "sagerock.github.io") location.replace("https://forth-app-production.up.railway.app/" + location.search + location.hash);</script>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/icons/forth-192.png">
<link rel="apple-touch-icon" href="/icons/forth-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #211f1a;
    font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; padding: 24px 16px; }

  .phone { position: relative; width: min(100%, 402px); height: min(calc(100dvh - 48px), 874px);
    border-radius: 40px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.05); background: var(--bg); }
  @media (max-width: 460px) {
    body { padding: 0; }
    .phone { width: 100%; height: 100dvh; border-radius: 0; box-shadow: none; }
  }

  /* Dark theme lifted ~15% (Jamie, Jul 20: "needs to be about 15% brighter
     overall. Hard to see" — on a phone OLED the old muted/faint alphas nearly
     vanished). The background stays; only the light on the words rises. */
  .phone[data-theme="dark"] { --bg:#141310; --card:rgba(230,224,208,0.08);
    --fg-strong:#faf5e9; --fg:#e4ded0; --muted:rgba(222,216,202,0.56); --faint:rgba(222,216,202,0.30);
    --accent:#b6c1a3; --accent-glow:radial-gradient(circle, rgba(182,193,163,0.20), rgba(182,193,163,0) 70%);
    --accent-line:rgba(182,193,163,0.55); --hair:rgba(222,216,202,0.15); }
  .phone[data-theme="paper"] { --bg:#faf8f3; --card:rgba(255,255,255,0.72);
    --fg-strong:#2b2a26; --fg:#4b4843; --muted:rgba(75,72,67,0.62); --faint:rgba(75,72,67,0.32);
    --accent:#58654d; --accent-glow:radial-gradient(circle, rgba(88,101,77,0.12), rgba(88,101,77,0) 70%);
    --accent-line:rgba(88,101,77,0.4); --hair:rgba(75,72,67,0.14); }

  .screen { position: absolute; inset: 0; background: var(--bg); color: var(--fg); display: flex; flex-direction: column; font-family: 'Hanken Grotesk', sans-serif; }
  .serif { font-family: 'Source Serif 4', Georgia, serif; }

  /* The wordmark is a constant: pinned at top-center, present on every screen,
     and it sits ABOVE the transition veil (z-index 9 > 8) so it never fades.
     While everything else dissolves to black and back, "Forth" holds — the
     thread that stitches the phases together. (Jamie, Jul 14.) */
  .brand { position: absolute; top: calc(env(safe-area-inset-top, 0px) + 22px); left: 50%; transform: translateX(-50%);
    z-index: 9; font-family: 'Source Serif 4', Georgia, serif; font-weight: 400; font-size: 19px;
    letter-spacing: 0.02em; color: var(--muted); pointer-events: none; }

  /* The ordinal: "For" + a raised "th", so the wordmark reads as Forth AND as
     4th at the same time. (Jamie, Jul 20.) Deliberately larger than a default
     <sup> (0.583em). Sizes were rendered side by side at the real 19px: 0.583
     and 0.66 still read as a footnote, 0.80 collapses back toward plain "Forth"
     and looks like a typo. 0.72 is the one that reads as an ordinal. Raised
     0.34em so its top sits just under the cap height of "F", not above it;
     letter-spacing opens it slightly because small serif type sets tight.
     Two numbers to retune if it wants to be bolder: font-size and bottom. */
  .ord { font-size: 0.72em; line-height: 1; letter-spacing: 0.04em;
    position: relative; bottom: 0.34em; vertical-align: baseline; }

  @keyframes forBreathe { 0%,100%{ transform:scale(0.62); opacity:0.45; } 50%{ transform:scale(1.04); opacity:0.92; } }
  @keyframes forFade { from{ opacity:0; } to{ opacity:1; } }
  @keyframes forRise { from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }
  @keyframes forHint { 0%,55%{ opacity:0; } 100%{ opacity:0.4; } }
  @keyframes forPulse { 0%,100%{ opacity:0.25; } 50%{ opacity:0.7; } }
  @keyframes forStep { from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:none; } }
  /* Shock: "I am" blooms slowly — still arriving for the full five seconds */
  @keyframes forNow { from{ opacity:0; transform:scale(0.86); } to{ opacity:1; transform:scale(1); } }
  /* Body step: an upright form that gently shifts its weight — distinct from the breath */
  @keyframes forTilt { 0%,100%{ transform:rotate(-4.5deg); } 50%{ transform:rotate(4.5deg); } }
  /* Breath step: "in" while the circle expands (0–50%), "out" while it contracts (50–100%) */
  @keyframes forInWord  { 0%{opacity:0;} 8%{opacity:0.85;} 42%{opacity:0.85;} 50%,100%{opacity:0;} }
  @keyframes forOutWord { 0%,50%{opacity:0;} 58%{opacity:0.85;} 92%{opacity:0.85;} 100%{opacity:0;} }

  .tap { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .act { font-size:13px; letter-spacing:0.16em; text-transform:uppercase; }
  .replies-link { font-size:13px; letter-spacing:0.06em; color:var(--accent); border-bottom:1px solid var(--accent-line); padding-bottom:2px; }

  textarea:focus, input:focus { outline: none; }
  textarea::placeholder, input::placeholder { color: var(--faint); }
  .tap:focus-visible { outline: 2px solid var(--accent, #aab598); outline-offset: 3px; border-radius: 8px; }

  /* Reduce Motion: in this app, motion is instruction, not decoration — the
     breathing circle IS the guidance, and the slow arrivals ARE the pacing.
     The old blanket rule (all animations -> 1ms) turned the whole app static
     for anyone with the iOS accessibility setting on, which read as "the
     animations don't work on my phone" (Jamie, Jul 14 + Jul 20). Instead:
     honor the setting by removing spatial movement — scale, tilt, rise — and
     re-express the same keyframes as pure light, at their full durations. The
     breath still breathes, as a slow pulse of brightness instead of expansion. */
  @media (prefers-reduced-motion: reduce) {
    @keyframes forBreathe { 0%,100%{ transform:none; opacity:0.45; } 50%{ transform:none; opacity:0.92; } }
    @keyframes forNow  { from{ opacity:0; transform:none; } to{ opacity:1; transform:none; } }
    @keyframes forRise { from{ opacity:0; transform:none; } to{ opacity:1; transform:none; } }
    @keyframes forStep { from{ opacity:0; transform:none; } to{ opacity:1; transform:none; } }
    /* the metronome stick pulses in brightness instead of swaying */
    @keyframes forTilt { 0%,100%{ transform:none; opacity:0.5; } 50%{ transform:none; opacity:1; } }
  }
</style>
</head>
<body>

  <div class="phone" id="phone" data-theme="dark">
    <div class="screen" id="screen"></div>
    <div class="brand serif" id="brand">For<span class="ord">th</span></div>
  </div>

<script>
(function () {
  // The pause is one guided sequence, the same every time — body, then breath, then mind (mind last).
  // Each step has its own visual: the body shifts, the breath opens and closes, the mind goes still.
  // It ends on a still dot, then two doors: forth (leave) or question (stay). The user decides.
  const PAUSE_STEPS = [
    { head: "Wake your body", sub: "consciously shift your position", ms: 8500,  kind: "body"   },
    { head: "Breathe deeply", sub: "feel your emotion",              ms: 11000, kind: "breath" },
    { head: "Open your mind", sub: "prepare space without thought",  ms: 13000, kind: "mind"   },
  ];

  const state = {
    screen: "shock",
    theme: "dark",
    // Sounds off (Jamie, Jul 13). If reintroduced later: lower pitch, calm, marimba-like.
    sound: false,
    pauseStep: 0,
    callIds: [],
    currentQuestion: null,
    byoqStage: "open",
    lastQuestionId: null,
    pushState: "loading",
  };

  const phone   = document.getElementById("phone");
  const screen  = document.getElementById("screen");
  let timer = null;

  const clearTimer = () => { if (timer) { clearTimeout(timer); timer = null; } };
  const curQ = () => state.currentQuestion;
  const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const TOKEN_KEY = "forth:delete-tokens";
  const readTokens = () => { try { return JSON.parse(localStorage.getItem(TOKEN_KEY) || "{}"); } catch (e) { return {}; } };
  const tokenKey = (kind, id) => `${kind}:${id}`;
  const canDelete = (kind, id) => Boolean(readTokens()[tokenKey(kind, id)]);
  function saveDeleteToken(kind, id, token) {
    try {
      const tokens = readTokens();
      tokens[tokenKey(kind, id)] = token;
      localStorage.setItem(TOKEN_KEY, JSON.stringify(tokens));
      return true;
    } catch (error) {
      console.error(error);
      return false;
    }
  }
  function forgetDeleteToken(kind, id) {
    const tokens = readTokens();
    delete tokens[tokenKey(kind, id)];
    localStorage.setItem(TOKEN_KEY, JSON.stringify(tokens));
  }
  async function api(path, options = {}) {
    const response = await fetch(path, {
      ...options,
      headers: { "Content-Type": "application/json", ...(options.headers || {}) }
    });
    if (!response.ok) {
      const error = new Error(`Request failed: ${response.status}`);
      error.status = response.status;
      throw error;
    }
    return response.status === 204 ? null : response.json();
  }
  async function deleteWords(kind, id, token) {
    const response = await fetch(`/api/${kind}/${id}`, {
      method: "DELETE",
      headers: { "x-delete-token": token }
    });
    if (response.status !== 204 && response.status !== 404) throw new Error(`Delete failed: ${response.status}`);
  }

  // ---- Small "faces": initial avatars -------------------------------------
  const AV_COLORS = ["rgba(170,181,152,0.34)","rgba(192,138,94,0.30)","rgba(138,153,129,0.36)","rgba(150,142,120,0.34)","rgba(120,150,150,0.32)"];
  const initials = (n) => n.split(/\s+/).map(w => w[0] || "").join("").slice(0, 2).toUpperCase();
  const avColor = (n) => { let h = 0; for (const c of n) h = (h * 31 + c.charCodeAt(0)) >>> 0; return AV_COLORS[h % AV_COLORS.length]; };
  const authorRow = (name, note) => `
    <div style="display:flex; align-items:center; gap:9px; margin-top:9px;">
      <div style="width:24px; height:24px; border-radius:50%; background:${avColor(name)}; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--fg-strong); font-weight:600;">${esc(initials(name))}</div>
      <div style="font-size:12.5px; color:var(--muted);">${esc(name)}${note ? ` · <span style="color:var(--faint);">${note}</span>` : ""}</div>
    </div>`;

  // ---- Sound: soft two-note chimes via Web Audio -------------------------
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; } }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }
  function chime(kind) {
    if (!state.sound || !audioCtx) return;
    const now = audioCtx.currentTime;
    const notes = kind === "open" ? [587.33, 880.0] : [880.0, 587.33];
    notes.forEach((f, i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = "sine"; o.frequency.value = f;
      const t = now + i * 0.30;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.13, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 1.6);
      o.connect(g).connect(audioCtx.destination);
      o.start(t); o.stop(t + 1.7);
    });
  }

  // ---- Questions ----------------------------------------------------------
  async function pullQuestion() {
    const exclude = state.callIds.length ? `?exclude=${state.callIds.join(",")}` : "";
    try {
      const { question } = await api(`/api/questions/random${exclude}`);
      state.currentQuestion = question;
      if (!state.callIds.includes(question.id)) state.callIds.push(question.id);
    } catch (error) {
      // 404 means nobody has asked anything yet — a quiet room, not an outage.
      if (error.status === 404) { state.currentQuestion = null; return; }
      throw error;
    }
  }

  // Renders its own wrapper so screens with no delete right emit nothing at all
  // (an empty spacer div is still a trace of a control you don't have). The
  // default margin indents past the study-room avatar; centered screens pass
  // their own.
  const ownAction = (kind, id, wrap = "margin:8px 0 0 33px;") => canDelete(kind, id)
    ? `<div style="${wrap}"><span class="tap" data-action="delete" data-kind="${kind}" data-id="${id}" style="font-size:11px; letter-spacing:0.06em; color:var(--faint);">remove my words</span></div>`
    : "";

  // ---- Pause building blocks ----------------------------------------------
  const dotsHTML = (active) => PAUSE_STEPS.map((_, i) =>
    `<div style="width:6px; height:6px; border-radius:50%; background:${i === active ? "var(--accent)" : "var(--hair)"};"></div>`).join("");

  const pauseTextHTML = (step) =>
    `<div class="serif" style="font-size:24px; line-height:1.3; color:var(--fg-strong);">${esc(step.head)}</div>
     <div style="font-size:13.5px; letter-spacing:0.04em; color:var(--muted);">${esc(step.sub)}</div>`;

  // Body: a single stick swaying like a metronome, inside a faint ring.
  const bodyVisualHTML = () => `
    <div style="position:relative; width:190px; height:190px; display:flex; align-items:center; justify-content:center;">
      <div style="position:absolute; width:190px; height:190px; border-radius:50%; border:1px solid var(--accent); opacity:0.28;"></div>
      <div style="position:absolute; bottom:34px; width:1px; height:96px; background:var(--accent-line); transform-origin:bottom center; animation:forTilt 5.2s ease-in-out infinite;">
        <div style="position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:10px; height:10px; border-radius:50%; background:var(--accent); opacity:0.85;"></div>
      </div>
    </div>`;

  // Breath: the ring comes alive and breathes, with in/out guidance at its center.
  const breathVisualHTML = () => `
    <div style="position:relative; width:190px; height:190px; display:flex; align-items:center; justify-content:center;">
      <div style="position:absolute; width:190px; height:190px; border-radius:50%; border:1px solid var(--accent); animation:forBreathe 11s ease-in-out infinite;"></div>
      <div style="position:absolute; width:190px; height:190px; border-radius:50%; background:var(--accent-glow); animation:forBreathe 11s ease-in-out infinite;"></div>
      <div id="breathWords" style="position:relative; width:72px; height:18px; transition:opacity 1s ease;">
        <span style="position:absolute; inset:0; text-align:center; font-size:12px; letter-spacing:0.22em; color:var(--fg-strong); animation:forInWord 11s ease-in-out infinite;">in</span>
        <span style="position:absolute; inset:0; text-align:center; font-size:12px; letter-spacing:0.22em; color:var(--fg-strong); animation:forOutWord 11s ease-in-out infinite;">out</span>
      </div>
    </div>`;

  // Advance one pause step in place: the text dissolves and swaps, the image stays.
  function advancePauseStep() {
    const prevKind = PAUSE_STEPS[state.pauseStep].kind;
    state.pauseStep++;
    const step = PAUSE_STEPS[state.pauseStep];
    const textEl = document.getElementById("pauseText");
    const visualEl = document.getElementById("pauseVisual");
    const dotsEl = document.getElementById("pauseDots");

    if (dotsEl) dotsEl.innerHTML = dotsHTML(state.pauseStep);
    if (textEl) {
      textEl.style.opacity = "0";
      setTimeout(() => { textEl.innerHTML = pauseTextHTML(step); textEl.style.opacity = "1"; }, 600);
    }

    if (prevKind === "body" && step.kind === "breath") {
      // The metronome becomes the breath — cross-fade the image (no black); breath begins.
      if (visualEl) {
        visualEl.style.opacity = "0";
        setTimeout(() => { visualEl.innerHTML = breathVisualHTML(); visualEl.style.opacity = "1"; }, 600);
      }
    } else if (prevKind === "breath" && step.kind === "mind") {
      // Critical: the breath must NOT stop, or you hold your breath. Keep the same
      // breathing circle running; only retire the in/out words so the mind feels quieter.
      const words = document.getElementById("breathWords");
      if (words) { words.style.opacity = "0"; setTimeout(() => { if (words.parentNode) words.remove(); }, 1000); }
    }
  }

  function schedulePauseStep() {
    const step = PAUSE_STEPS[state.pauseStep];
    timer = setTimeout(() => {
      if (state.pauseStep < PAUSE_STEPS.length - 1) {
        advancePauseStep();
        schedulePauseStep();
      } else {
        go("still");
      }
    }, step.ms);
  }

  function pushSectionHTML() {
    if (state.pushState === "on") return `
      <div style="font-size:14.5px; line-height:1.7; color:var(--muted); margin-bottom:14px;">Forth may call at an unexpected moment. Nothing else will be sent.</div>
      <span class="tap" data-action="disablePush" style="font-size:12px; letter-spacing:0.1em; color:var(--faint);">silence the call</span>`;
    if (state.pushState === "install") return `
      <div style="font-size:14.5px; line-height:1.7; color:var(--muted);">In Safari, use Share and <em>Add to Home Screen</em>. Open Forth from there to allow the call.</div>`;
    if (state.pushState === "ready") return `
      <div style="font-size:14.5px; line-height:1.7; color:var(--muted); margin-bottom:16px;">Allow a quiet reminder at an unexpected moment. The notification carries only the shock.</div>
      <span class="tap act" data-action="enablePush" style="display:inline-block; color:var(--accent); border:1px solid var(--accent-line); border-radius:999px; padding:11px 24px;">allow the call</span>`;
    if (state.pushState === "blocked") return `<div style="font-size:14.5px; line-height:1.7; color:var(--muted);">Notifications are silenced in this browser's settings.</div>`;
    if (state.pushState === "unavailable") return `<div style="font-size:14.5px; line-height:1.7; color:var(--muted);">This browser cannot receive the call.</div>`;
    return `<div style="font-size:14.5px; color:var(--faint);">&nbsp;</div>`;
  }

  function deviceWordsHTML() {
    if (!Object.keys(readTokens()).length) return "";
    return `
      <div class="serif" style="font-size:18px; color:var(--fg-strong); margin-bottom:8px;">Your words</div>
      <div style="font-size:14.5px; line-height:1.7; color:var(--muted); margin-bottom:14px;">This device remembers only what it needs to remove words written here.</div>
      <span class="tap" data-action="deleteAll" style="font-size:12px; letter-spacing:0.1em; color:var(--faint);">remove my words from this device</span>
      <div style="height:28px;"></div>`;
  }

  // ---- Screens ------------------------------------------------------------
  const screens = {
    // The shock: the app opens on two words — "I am" — blooming slowly for ~5s,
    // then dissolves on its own into the pause. The "Forth" wordmark lives in the
    // persistent top brand now (see .brand), so the screen is just those words.
    // No tap, no call screen, no clock. (Was "Now"; Jamie, Jul 20 — self-
    // remembering rather than present-moment.)
    shock: () => `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px 40px 56px; animation:forFade 1.2s ease both;">
        <div style="flex:1"></div>
        <div class="serif" style="font-size:64px; font-weight:400; line-height:1; color:var(--fg-strong); animation:forNow 5.2s cubic-bezier(0.22,0.6,0.36,1) both;">I am</div>
        <div style="flex:1"></div>
        <div style="font-size:12.5px; letter-spacing:0.28em; text-transform:uppercase; color:var(--muted);">self-remembering</div>
      </div>`,

    // The guided pause: body -> breath -> mind. The image runs CONTINUOUSLY the
    // whole way through — only the text dissolves between steps, and the breath
    // never stops (stopping it made Jamie hold his breath). Steps advance in
    // place via advancePauseStep(), not by re-rendering the screen.
    pause: () => {
      const step = PAUSE_STEPS[state.pauseStep] || PAUSE_STEPS[0];
      const visual = step.kind === "body" ? bodyVisualHTML() : breathVisualHTML();
      return `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:52px 40px; overflow:hidden;">
        <div style="height:40px;"></div>
        <div id="pauseVisual" style="flex:1; display:flex; align-items:center; justify-content:center; width:100%; transition:opacity 0.6s ease;">${visual}</div>
        <div id="pauseText" style="min-height:78px; display:flex; flex-direction:column; align-items:center; gap:9px; text-align:center; transition:opacity 0.6s ease;">${pauseTextHTML(step)}</div>
        <div id="pauseDots" style="display:flex; gap:8px; margin-top:22px;">${dotsHTML(state.pauseStep)}</div>
      </div>`;
    },

    questions: () => {
      const q = curQ();
      // The quiet room: no one has asked anything yet. Not an error — an
      // invitation. The first real question is what opens the space.
      if (!q) return `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px 40px 44px; animation:forFade 1.6s ease both;">
        <div style="flex:1"></div>
        <div class="serif" style="font-size:26px; font-weight:400; line-height:1.5; text-align:center; text-wrap:balance; color:var(--fg-strong); animation:forRise 1.8s ease both;">The room is quiet.</div>
        <div style="margin-top:14px; font-size:14.5px; line-height:1.7; color:var(--muted); text-align:center; max-width:260px; animation:forRise 1.8s ease 0.3s both;">No one has left a question yet. Yours could be the first.</div>
        <div style="margin-top:30px; animation:forHint 3.5s ease both;">
          <span class="tap act" data-go="byoq" style="color:var(--accent); border:1px solid var(--accent-line); border-radius:999px; padding:12px 26px;">Ask a question</span>
        </div>
        <div style="flex:1"></div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:18px; animation:forHint 4s ease both;">
          <div style="display:flex; gap:26px;">
            <div class="tap" data-go="about" style="font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">about</div>
            <div class="tap" data-go="rest" style="font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">leave</div>
          </div>
        </div>
      </div>`;
      // No counts, and no absence-of-counts either (Jamie, Jul 20). The link is
      // ALWAYS "read more", worded and shown identically whether or not anyone
      // has replied — because a link that appears only when replies exist is
      // itself a count, just a coarse one. You find out by going.
      return `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px 40px 44px; animation:forFade 1.6s ease both;">
        <div style="flex:1"></div>
        <div class="serif" style="font-size:30px; font-weight:400; line-height:1.42; text-align:center; text-wrap:balance; color:var(--fg-strong); animation:forRise 1.8s ease both;">${esc(q.text)}</div>
        <div style="margin-top:22px; animation:forHint 3.5s ease both;">
          <span class="tap replies-link" data-go="study">read more</span>
        </div>
        <div style="flex:1"></div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:18px; animation:forHint 4s ease both;">
          ${state.callIds.length < 2 ? `<span class="tap act" data-action="another" style="color:var(--muted);">another</span>` : ``}
          <div style="display:flex; gap:26px;">
            <div class="tap" data-go="about" style="font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">about</div>
            <div class="tap" data-go="rest" style="font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">leave</div>
          </div>
        </div>
      </div>`;
    },

    study: () => {
      const q = curQ();
      // An unanswered question shows the question and nothing else — no "no one
      // has replied yet", which is just a count of zero wearing a sentence.
      // The Reply action below is the only thing offered. (Jamie, Jul 20.)
      const body = q.replies.map(r => `
            <div style="margin-bottom:26px;">
              <div style="font-size:15.5px; line-height:1.72; color:var(--fg);">${esc(r.text)}</div>
              ${authorRow(r.handle, "")}
              ${ownAction("replies", r.id)}
            </div>`).join("");
      return `
      <div style="height:100%; overflow-y:auto; padding:72px 28px 40px; animation:forFade 1s ease both;">
        <div class="serif" style="font-size:14px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:18px;">The Study Room</div>
        <div class="serif" style="font-size:24px; line-height:1.4; color:var(--fg-strong); margin-bottom:8px;">${esc(q.text)}</div>
        ${authorRow(q.handle, "")}
        ${ownAction("questions", q.id)}
        <div style="height:1px; background:var(--hair); margin:20px 0 26px;"></div>
        ${body}
        ${q.replies.length ? `<div style="height:1px; background:var(--hair); margin:14px 0 26px;"></div>` : ``}
        <div style="display:flex; flex-direction:column; align-items:center; gap:18px;">
          <div style="display:flex; gap:26px;">
            <span class="tap act" data-go="respond" style="color:var(--accent);">Reply</span>
            <span class="tap act" data-go="byoq" style="color:var(--muted);">Ask a question</span>
          </div>
          <div style="display:flex; gap:26px;">
            <div class="tap" data-go="about" style="font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">about</div>
            <div class="tap" data-go="rest" style="font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">leave</div>
          </div>
        </div>
      </div>`;
    },

    respond: () => {
      const q = curQ();
      return `
      <div style="height:100%; display:flex; flex-direction:column; padding:84px 34px 44px; animation:forFade 1s ease both;">
        <div class="serif" style="font-size:13px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:16px;">Responding to</div>
        <div class="serif" style="font-size:21px; line-height:1.4; color:var(--fg-strong); margin-bottom:22px;">${esc(q.text)}</div>
        <input id="respondHandle" maxlength="80" autocomplete="off" placeholder="name (or leave blank for anon)" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--hair); padding:8px 0; margin-bottom:18px; font:13px 'Hanken Grotesk',sans-serif; letter-spacing:0.03em; color:var(--fg);">
        <textarea id="respondInput" rows="5" placeholder="Say only what's true. No one is timing you." style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--hair); padding:8px 0; font-family:'Source Serif 4',serif; font-size:19px; line-height:1.5; color:var(--fg-strong); resize:none;"></textarea>
        <div style="flex:1"></div>
        <div class="tap act" data-action="reply" style="align-self:center; color:var(--accent); border:1px solid var(--accent-line); border-radius:999px; padding:13px 32px;">Reply</div>
        <div style="text-align:center; margin-top:14px; font-size:11.5px; letter-spacing:0.1em; color:var(--faint);">when you reply, it will hold you a moment</div>
        <div class="tap" data-go="rest" style="text-align:center; margin-top:20px; font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">leave</div>
      </div>`;
    },

    freeze: () => `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px; animation:forFade 1.4s ease both;">
        <div style="width:9px; height:9px; border-radius:50%; background:var(--accent); opacity:0.8; animation:forBreathe 6s ease-in-out infinite;"></div>
        <div style="margin-top:32px; font-size:12px; letter-spacing:0.26em; text-transform:uppercase; color:var(--faint); animation:forHint 5s ease both;">held</div>
      </div>`,

    // After the pause: a still point — just the dot, quietly alive, ~5s —
    // before the two doors appear.
    still: () => `
      <div style="height:100%; display:flex; align-items:center; justify-content:center; padding:64px; animation:forFade 1.4s ease both;">
        <div style="width:9px; height:9px; border-radius:50%; background:var(--accent); opacity:0.8; animation:forBreathe 6s ease-in-out infinite;"></div>
      </div>`,

    // The user decides what the moment becomes: leave, or stay for the group's
    // question. Two doors, no default, no push — leaving is offered first.
    choice: () => `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px 40px; animation:forFade 2.4s ease both;">
        <div style="flex:1"></div>
        <div class="tap" data-go="rest" style="display:flex; flex-direction:column; align-items:center; gap:8px; padding:18px 48px; animation:forRise 2.2s ease 0.4s both;">
          <div class="serif" style="font-size:27px; color:var(--fg-strong);">forth</div>
          <div style="font-size:11.5px; letter-spacing:0.22em; text-transform:uppercase; color:var(--faint);">leave</div>
        </div>
        <div style="height:40px;"></div>
        <div class="tap" data-go="questions" style="display:flex; flex-direction:column; align-items:center; gap:8px; padding:18px 48px; animation:forRise 2.2s ease 1.3s both;">
          <div class="serif" style="font-size:27px; color:var(--fg-strong);">question</div>
          <div style="font-size:11.5px; letter-spacing:0.22em; text-transform:uppercase; color:var(--faint);">stay</div>
        </div>
        <div style="flex:1"></div>
      </div>`,

    // The end card. Leaving is blessed, not instructed — body, emotion, mind,
    // in that order (Jamie's language, Jul 14).
    rest: () => `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:64px 40px; animation:forFade 2.2s ease both;">
        <div class="serif" style="font-size:21px; line-height:1.6; color:var(--fg);">
          <div style="animation:forRise 2.4s ease 0.3s both;">May you be well</div>
          <div style="margin-top:18px; animation:forRise 2.4s ease 1.7s both;">May you have love</div>
          <div style="margin-top:18px; animation:forRise 2.4s ease 3.1s both;">May you have peace in your life</div>
        </div>
      </div>`,

    about: () => `
      <div style="height:100%; overflow-y:auto; padding:80px 30px 56px; animation:forFade 1.2s ease both;">
        <div class="serif" style="font-size:15px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:20px;">About this group</div>
        <div class="serif" style="font-size:19px; line-height:1.62; color:var(--fg); margin-bottom:16px;">We are a living group formed in 2026 to study and discuss the ideas of Gurdjieff's Fourth Way. We seek to remember ourselves. We claim no authority or lineage.</div>
        <div style="font-size:15px; line-height:1.72; color:var(--muted); margin-bottom:14px;">Current members are encouraged to read, reflect, and contribute. All content here is user-generated and kept for continued reflection. The group is alive: members come and go, and what exists in this space is the responsibility of the current users.</div>
        <div style="height:1px; background:var(--hair); margin:26px 0;"></div>
        <div class="serif" style="font-size:18px; color:var(--fg-strong); margin-bottom:8px;">Why a phone?</div>
        <div style="font-size:15px; line-height:1.72; color:var(--muted); margin-bottom:26px;">It's hard to say what Gurdjieff would make of these devices. They're built to be addictive — and the work is to break free of automatism. Learning to use one with attention may be exactly the training.</div>
        <div class="serif" style="font-size:18px; color:var(--fg-strong); margin-bottom:8px;">Let it call</div>
        <div id="pushSection" style="margin-bottom:28px;">${pushSectionHTML()}</div>
        ${deviceWordsHTML()}
        <div class="serif" style="font-size:18px; color:var(--fg-strong); margin-bottom:16px;">Suggestions for being here</div>
        <div style="display:flex; flex-direction:column; gap:20px;">
          ${[
            ["When it calls you, stop.", "The app calls to you briefly. Be present for the moment it gives you — that moment is the point. You may react, but you need not engage."],
            ["Bring questions.", "Post them to ask yourself and the group. You are the text of this group. A question may be lived with and left unresolved; within each one, answers may already exist. Resist the desire to mine them. Let the questions remain unmolested."],
            ["Bring attention.", "You may take part fully just by being present — without commenting, questioning, or posting at all. Until more is needed, there are no rules for how you do or don't engage."],
            ["Keep the goal in view.", "We are here to remember ourselves — to bring mind, body, and soul together as we question our way to waking."],
          ].map(([h, b]) => `
            <div>
              <div class="serif" style="font-style:italic; font-size:16px; color:var(--fg); margin-bottom:5px;">${h}</div>
              <div style="font-size:14.5px; line-height:1.7; color:var(--muted);">${b}</div>
            </div>`).join("")}
        </div>
        <div class="tap" data-go="rest" style="text-align:center; margin-top:30px; font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">leave</div>
      </div>`,

    byoq: () => state.byoqStage === "open" ? `
      <div style="height:100%; display:flex; flex-direction:column; padding:96px 34px 56px; animation:forFade 1.2s ease both;">
        <div class="serif" style="font-size:15px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:26px;">A question of your own</div>
        <div class="serif" style="font-size:24px; line-height:1.4; color:var(--fg-strong); margin-bottom:8px;">Leave a question with the group.</div>
        <div style="font-size:14.5px; line-height:1.7; color:var(--muted); margin-bottom:34px;">Not to be answered. To be lived with. No one will like it, count it, or reply — until, one day, someone does.</div>
        <input id="byoqHandle" maxlength="80" autocomplete="off" placeholder="name (or leave blank for anon)" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--hair); padding:8px 0; margin-bottom:18px; font:13px 'Hanken Grotesk',sans-serif; letter-spacing:0.03em; color:var(--fg);">
        <textarea id="byoqInput" rows="3" placeholder="What do you want to sit with?" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--hair); padding:8px 0; font-family:'Source Serif 4',serif; font-size:20px; line-height:1.4; color:var(--fg-strong); resize:none;"></textarea>
        <div style="flex:1"></div>
        <div class="tap act" data-action="submitByoq" style="align-self:center; color:var(--accent); border:1px solid var(--accent-line); border-radius:999px; padding:13px 30px;">Leave it</div>
        <div class="tap" data-go="rest" style="text-align:center; margin-top:20px; font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">leave</div>
      </div>` : `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:64px 34px; animation:forFade 1.4s ease both;">
        <div class="serif" style="font-style:italic; font-size:22px; color:var(--fg-strong); margin-bottom:14px;">It's with the group.</div>
        <div style="font-size:14px; line-height:1.7; color:var(--muted); max-width:250px; margin-bottom:30px;">Let it be. It will find you, or someone, another day.</div>
        ${state.lastQuestionId ? ownAction("questions", state.lastQuestionId, "margin-bottom:22px;") : ""}
        <div class="tap" data-go="rest" style="font-size:12.5px; letter-spacing:0.14em; color:var(--faint);">leave</div>
      </div>`,

    roomError: () => `
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:64px 40px; animation:forFade 1.4s ease both;">
        <div class="serif" style="font-size:21px; line-height:1.5; color:var(--fg-strong);">The room could not be reached.</div>
        <div class="tap act" data-action="retry" style="margin-top:28px; color:var(--accent);">try again</div>
      </div>`,
  };

  // ---- Render & navigation ------------------------------------------------
  // Paint the current screen. When `dissolve` is true, the transition fades the
  // screen down to a full black hold (~1s) and back up — a deliberate breath of
  // darkness between phases, not a crossfade. (Jamie's call.)
  // Jamie's tuning (Jul 13): let the words dissolve longer, hold less black — smoother, less jerky.
  const FADE_OUT_MS = 1150, BLACK_HOLD_MS = 500, FADE_IN_MS = 800;
  function commitScreen() {
    phone.setAttribute("data-theme", state.theme);
    screen.innerHTML = screens[state.screen]();
  }
  function paintScreen(dissolve) {
    if (!dissolve || !screen.innerHTML.trim()) { commitScreen(); return; }

    const veil = document.createElement("div");
    veil.style.cssText = "position:absolute; inset:0; background:#000; z-index:8; " +
      "opacity:0; pointer-events:none; transition:opacity " + FADE_OUT_MS + "ms ease;";
    phone.appendChild(veil);
    void veil.offsetWidth;                                   // commit start state
    requestAnimationFrame(() => { veil.style.opacity = "1"; });  // fade down to black

    setTimeout(() => {
      commitScreen();                                        // swap under full black
      setTimeout(() => {
        veil.style.transition = "opacity " + FADE_IN_MS + "ms ease";
        veil.style.opacity = "0";                            // fade the new screen up
        setTimeout(() => { if (veil.parentNode) veil.parentNode.removeChild(veil); }, FADE_IN_MS + 60);
      }, BLACK_HOLD_MS);
    }, FADE_OUT_MS);
  }

  function render() { paintScreen(false); }

  async function go(name) {
    clearTimer();

    if (name === "shock" || name === "pause") {
      state.callIds = [];
      state.currentQuestion = null;
    }
    try {
      if (name === "questions" && state.callIds.length === 0) await pullQuestion();
      if (["study", "respond", "byoq"].includes(name) && !curQ()) await pullQuestion();
    } catch (error) {
      console.error(error);
      state.screen = "roomError";
      paintScreen(true);
      return;
    }
    if (name === "byoq") state.byoqStage = "open";

    state.screen = name;

    if (name === "pause") {
      state.pauseStep = 0;
      paintScreen(true);
      ensureAudio(); chime("open");
      schedulePauseStep();
      return;
    }

    paintScreen(true);

    if (name === "shock") {
      timer = setTimeout(() => { void go("pause"); }, 5800);  // "I am" gets its five seconds, then dissolves straight into the pause
    } else if (name === "still") {
      timer = setTimeout(() => { void go("choice"); }, 6500); // ~5s of visible stillness once the dissolve clears, then the two doors
    } else if (name === "freeze") {
      timer = setTimeout(() => { void go("rest"); }, 10000);
    } else if (name === "rest") {
      timer = setTimeout(() => { void go("shock"); }, 14000); // long enough to receive all three lines
    }
  }

  let vapidPublicKey = "";
  const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  const isStandalone = matchMedia("(display-mode: standalone)").matches || navigator.standalone === true;

  function applicationServerKey(value) {
    const padding = "=".repeat((4 - value.length % 4) % 4);
    const base64 = (value + padding).replace(/-/g, "+").replace(/_/g, "/");
    return Uint8Array.from(atob(base64), (character) => character.charCodeAt(0));
  }

  async function refreshPushState() {
    try {
      if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
        state.pushState = "unavailable";
      } else if (isIos && !isStandalone) {
        state.pushState = "install";
      } else if (Notification.permission === "denied") {
        state.pushState = "blocked";
      } else {
        const settings = await api("/api/push/public-key");
        if (!settings.enabled) {
          state.pushState = "unavailable";
        } else {
          vapidPublicKey = settings.publicKey;
          const registration = await navigator.serviceWorker.register("/service-worker.js");
          const subscription = await registration.pushManager.getSubscription();
          if (subscription) {
            await api("/api/push/subscriptions", {
              method: "POST",
              body: JSON.stringify({
                subscription: subscription.toJSON(),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC"
              })
            });
          }
          state.pushState = subscription ? "on" : "ready";
        }
      }
    } catch (error) {
      console.error(error);
      state.pushState = "unavailable";
    }
    if (state.screen === "about") render();
  }

  async function enablePush() {
    const permission = await Notification.requestPermission();
    if (permission !== "granted") {
      state.pushState = "blocked";
      render();
      return;
    }
    const registration = await navigator.serviceWorker.ready;
    const subscription = await registration.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: applicationServerKey(vapidPublicKey)
    });
    await api("/api/push/subscriptions", {
      method: "POST",
      body: JSON.stringify({
        subscription: subscription.toJSON(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC"
      })
    });
    state.pushState = "on";
    render();
  }

  async function disablePush() {
    const registration = await navigator.serviceWorker.ready;
    const subscription = await registration.pushManager.getSubscription();
    if (subscription) {
      await api("/api/push/unsubscribe", {
        method: "POST",
        body: JSON.stringify({ endpoint: subscription.endpoint })
      });
      await subscription.unsubscribe();
    }
    state.pushState = "ready";
    render();
  }

  // ---- Events -------------------------------------------------------------
  document.addEventListener("click", async (e) => {
    ensureAudio();

    const goEl = e.target.closest("[data-go]");
    if (goEl) { await go(goEl.getAttribute("data-go")); return; }

    const act = e.target.closest("[data-action]");
    if (act) {
      if (act.dataset.busy === "true") return;
      act.dataset.busy = "true";
      const a = act.getAttribute("data-action");
      try {
        if (a === "another") {
          if (state.callIds.length < 2) await pullQuestion();
          render(); return;
        }
        if (a === "reply") {
          const text = document.getElementById("respondInput")?.value.trim();
          const handle = document.getElementById("respondHandle")?.value.trim();
          if (!text || !curQ()) return;
          const { reply } = await api(`/api/questions/${curQ().id}/replies`, {
            method: "POST", body: JSON.stringify({ text, handle })
          });
          if (!saveDeleteToken("replies", reply.id, reply.deleteToken)) {
            await deleteWords("replies", reply.id, reply.deleteToken);
            throw new Error("This device could not retain the deletion token.");
          }
          delete reply.deleteToken;
          curQ().replies.push(reply);
          await go("freeze"); return;
        }
        if (a === "submitByoq") {
          const text = document.getElementById("byoqInput")?.value.trim();
          const handle = document.getElementById("byoqHandle")?.value.trim();
          if (!text) return;
          const { question } = await api("/api/questions", {
            method: "POST", body: JSON.stringify({ text, handle })
          });
          if (!saveDeleteToken("questions", question.id, question.deleteToken)) {
            await deleteWords("questions", question.id, question.deleteToken);
            throw new Error("This device could not retain the deletion token.");
          }
          state.lastQuestionId = question.id;
          state.byoqStage = "done"; render(); return;
        }
        if (a === "delete") {
          const kind = act.getAttribute("data-kind");
          const id = act.getAttribute("data-id");
          const token = readTokens()[tokenKey(kind, id)];
          if (!token) return;
          await deleteWords(kind, id, token);
          forgetDeleteToken(kind, id);
          if (kind === "questions") {
            state.currentQuestion = null;
            state.callIds = [];
            state.lastQuestionId = null;
            await go(state.screen === "byoq" ? "rest" : "questions");
          } else {
            curQ().replies = curQ().replies.filter((reply) => reply.id !== id);
            render();
          }
          return;
        }
        if (a === "deleteAll") {
          if (!window.confirm("Remove every question and reply written on this device?")) return;
          const tokens = readTokens();
          for (const [key, token] of Object.entries(tokens)) {
            const separator = key.indexOf(":");
            await deleteWords(key.slice(0, separator), key.slice(separator + 1), token);
          }
          localStorage.removeItem(TOKEN_KEY);
          state.currentQuestion = null;
          state.callIds = [];
          state.lastQuestionId = null;
          await go("rest");
          return;
        }
        if (a === "enablePush") { await enablePush(); return; }
        if (a === "disablePush") { await disablePush(); return; }
        if (a === "retry") { state.callIds = []; state.currentQuestion = null; await go("questions"); return; }
      } catch (error) {
        console.error(error);
        state.screen = "roomError";
        paintScreen(true);
      } finally {
        if (act.isConnected) delete act.dataset.busy;
      }
    }
  });

  void refreshPushState();
  void go("shock");
})();
</script>
</body>
</html>
